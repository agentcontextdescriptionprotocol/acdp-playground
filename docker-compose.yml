# The playground image builds with the parent dir as context so it can
# COPY both acdp-playground/ and the sibling acdp-rs/ repo (the Python
# SDK wheel is built from source). The registry images build with the
# sibling acdp-registry-rs/ repo as their own context — its Dockerfile
# consumes `acdp` from crates.io and expects the repo root at /app.

services:
  playground:
    build:
      context: ..
      dockerfile: acdp-playground/Dockerfile
    ports: ["8000:8000"]
    environment:
      REGISTRY_A_URL: http://registry-a:8100
      REGISTRY_B_URL: http://registry-b:8200
      REGISTRY_C_URL: http://registry-c:8300
      REGISTRY_A_AUTHORITY: registry-a.playground.local
      REGISTRY_B_AUTHORITY: registry-b.playground.local
      REGISTRY_C_AUTHORITY: registry-c.playground.local
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-}
      CONTROL_PLANE_HMAC_SECRET: ${CONTROL_PLANE_HMAC_SECRET:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-playground-dev-secret}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      registry-a:
        condition: service_healthy
      registry-b:
        condition: service_healthy
      registry-c:
        condition: service_healthy

  registry-a:
    build:
      context: ../acdp-registry-rs
      dockerfile: docker/Dockerfile
      args:
        STORAGE_FEATURE: storage-sqlite
    ports: ["8100:8100"]
    environment:
      # ACDP_REGISTRY_CONFIG is read directly via std::env (single underscore).
      ACDP_REGISTRY_CONFIG: /app/config.toml
      # The remaining ACDP_REGISTRY_* vars go through the registry's config
      # layering, which joins the env prefix with a single "_" and uses "__"
      # only as the nesting separator (acdp-registry-types::config). The old
      # double-underscore prefix form (ACDP_REGISTRY__AUTH__…) now maps to a
      # bogus top-level `_auth` field and aborts startup with
      # "config: unknown field `_auth`".
      ACDP_REGISTRY_WEBHOOK__SECRET: ${WEBHOOK_SECRET:-playground-dev-secret}
      # 32-byte base64 secret. The registry refuses to start with the
      # literal "changeme"; generate one with `openssl rand -base64 32`.
      ACDP_REGISTRY_AUTH__JWT_SECRET: ${ACDP_REGISTRY_JWT_SECRET:-cGxheWdyb3VuZC1zZWNyZXQtMzItYnl0ZXMtb2YtdGVzdC1qd3Q=}
      RUST_LOG: info,acdp=info,acdp_registry=info
    volumes:
      - ./config/registry-a.toml:/app/config.toml:ro
    tmpfs:
      # Ephemeral storage — named volumes mount as root on Docker
      # Desktop, but the registry runs as uid 1001. tmpfs is owned by
      # the container's effective user and dies with the container,
      # which is exactly what a demo wants.
      - /app/data
    healthcheck:
      # The registry runtime image is debian-slim without curl/wget; probe
      # the listener with bash's /dev/tcp instead.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8100"]
      interval: 5s
      timeout: 3s
      retries: 10

  registry-b:
    build:
      context: ../acdp-registry-rs
      dockerfile: docker/Dockerfile
      args:
        STORAGE_FEATURE: storage-sqlite
    ports: ["8200:8200"]
    environment:
      # ACDP_REGISTRY_CONFIG is read directly via std::env (single underscore).
      ACDP_REGISTRY_CONFIG: /app/config.toml
      # The remaining ACDP_REGISTRY_* vars go through the registry's config
      # layering, which joins the env prefix with a single "_" and uses "__"
      # only as the nesting separator (acdp-registry-types::config). The old
      # double-underscore prefix form (ACDP_REGISTRY__AUTH__…) now maps to a
      # bogus top-level `_auth` field and aborts startup with
      # "config: unknown field `_auth`".
      ACDP_REGISTRY_WEBHOOK__SECRET: ${WEBHOOK_SECRET:-playground-dev-secret}
      # 32-byte base64 secret. The registry refuses to start with the
      # literal "changeme"; generate one with `openssl rand -base64 32`.
      ACDP_REGISTRY_AUTH__JWT_SECRET: ${ACDP_REGISTRY_JWT_SECRET:-cGxheWdyb3VuZC1zZWNyZXQtMzItYnl0ZXMtb2YtdGVzdC1qd3Q=}
      RUST_LOG: info,acdp=info,acdp_registry=info
    volumes:
      - ./config/registry-b.toml:/app/config.toml:ro
    tmpfs:
      - /app/data
    healthcheck:
      # See registry-a: slim image, no curl — bash /dev/tcp probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The dedicated receipts-profile registry (RFC-ACDP-0010, ACDP 0.2). It
  # verifies every publish (no playground lax mode) so it can mint receipts;
  # the S22/S24 receipts scenarios publish here via did:key. The receipt
  # signing seed lives in config/registry-c.toml (kept in lock-step with the
  # playground's registry_c_receipt_seed_b64 setting).
  registry-c:
    build:
      context: ../acdp-registry-rs
      dockerfile: docker/Dockerfile
      args:
        STORAGE_FEATURE: storage-sqlite
    ports: ["8300:8300"]
    environment:
      ACDP_REGISTRY_CONFIG: /app/config.toml
      ACDP_REGISTRY_WEBHOOK__SECRET: ${WEBHOOK_SECRET:-playground-dev-secret}
      ACDP_REGISTRY_AUTH__JWT_SECRET: ${ACDP_REGISTRY_JWT_SECRET:-cGxheWdyb3VuZC1zZWNyZXQtMzItYnl0ZXMtb2YtdGVzdC1qd3Q=}
      RUST_LOG: info,acdp=info,acdp_registry=info
    volumes:
      - ./config/registry-c.toml:/app/config.toml:ro
    tmpfs:
      - /app/data
    healthcheck:
      # See registry-a: slim image, no curl — bash /dev/tcp probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8300"]
      interval: 5s
      timeout: 3s
      retries: 10
