[registry]
authority = "registry-b.playground.local"
port      = 8200
# Loopback-bind default / non-loopback refusal when TLS+auth are both off
# (registry #24). 0.0.0.0 is the explicit opt-in, safe because [auth] is
# enabled below and required for cross-container reachability. See registry-a.
bind      = "0.0.0.0"
profiles  = ["acdp-registry-core", "acdp-registry-discovery"]
cross_registry_resolution = true

[registry.tls]
enabled = false

[registry.cors]
allowed_origins = []

[storage]
backend     = "sqlite"
sqlite_path = "/app/data/registry-b.db"
max_connections = 10

[auth]
enabled                = true
# did:key enabled for parity with registry-a (ACDP 0.2 ephemeral
# agents). Receipts are intentionally NOT provisioned here — the
# receipts scenarios target registry-a only.
did_methods            = ["did:web", "did:key"]
anonymous_public_reads = true
token_ttl_seconds      = 3600
challenge_ttl_seconds  = 300
token_leeway_seconds   = 30
# jwt_secret comes from ACDP_REGISTRY_AUTH__JWT_SECRET (compose env).
require_tenant = false
admin_tokens   = ["playground-registry-admin"]

# Tenant bindings DISABLED in the default stack (multi-tenant fail-fast —
# see registry-a.toml for the full rationale). To exercise tenancy, set
# `require_tenant = true` and uncomment:
#   [[auth.tenant_agents]]
#   agent_did = "did:web:registry-b.playground.local:agents:tenant-b-agent"
#   tenant_id = "tenant-b"

[webhook]
# Disabled for local-stack demos (registry SSRF refuses http://); see
# registry-a.toml for the full rationale. Direct SSE still flows.
enabled        = false
url            = "http://playground:8000/webhooks/acdp"
timeout_seconds = 5
max_retries    = 3
queue_capacity = 1024

[limits]
max_payload_bytes           = 1048576
max_embedded_bytes          = 65536
idempotency_key_ttl_seconds = 86400
challenge_rate_per_minute   = 60

[playground]
enabled = true
