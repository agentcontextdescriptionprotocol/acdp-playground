name: Build & push playground image (ghcr)

# Builds the playground image and pushes it to GitHub Container Registry
# (ghcr.io/<owner>/acdp-playground) for deployment to Railway (see
# railway/DEPLOY.md).
#
# Scope: this repo publishes ONLY its own image. Each other stack image is
# published by its own repo on that repo's version tags (each repo owns its
# ghcr package):
#   acdp-registry      <- acdp-registry-rs    (.github/workflows/docker.yml)
#   acdp-control-plane <- acdp-control-plane   (.github/workflows/release.yml)
#   acdp-ui-console    <- acdp-ui-console
#
# The playground image embeds the acdp-py SDK through a path dependency, so the
# build needs the sibling acdp-rs checkout beside it (hence the shared `repos/`
# build context). acdp-rs is public, so the built-in GITHUB_TOKEN can clone it
# and no extra secret is required; a SIBLING_REPO_TOKEN PAT is still honoured if
# the repo is ever made private.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (in addition to `latest`)'
        required: false
        default: 'manual'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ghcr requires a lowercase owner; github.repository_owner already is.
  OWNER: ${{ github.repository_owner }}

jobs:
  image:
    name: build & push playground image
    runs-on: ubuntu-latest
    steps:
      # The playground Dockerfile resolves a path dependency on ../acdp-rs, so
      # both repos are checked out side by side under a shared `repos/` parent
      # and the image is built from there.
      - name: Checkout playground
        uses: actions/checkout@v5
        with:
          path: repos/acdp-playground

      - name: Checkout acdp-rs
        uses: actions/checkout@v5
        with:
          repository: ${{ env.OWNER }}/acdp-rs
          token: ${{ secrets.SIBLING_REPO_TOKEN || github.token }}
          path: repos/acdp-rs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute extra tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      # ── playground (Python; context = shared parent, needs acdp-rs) ──────
      - name: Build & push playground
        uses: docker/build-push-action@v6
        with:
          context: repos
          file: repos/acdp-playground/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/acdp-playground:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/acdp-playground:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=playground
          cache-to: type=gha,scope=playground,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed image (\`${{ steps.meta.outputs.tag }}\` + \`latest\`)"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.OWNER }}/acdp-playground\`"
            echo ""
            echo "Other stack images are published by their own repos — see \`railway/DEPLOY.md\`."
          } >> "$GITHUB_STEP_SUMMARY"
