[registry]
authority = "registry-a.playground.local"
port      = 8100
bind      = "0.0.0.0"
profiles  = ["acdp-registry-core", "acdp-registry-discovery"]
cross_registry_resolution = true

[registry.tls]
enabled = false

[registry.cors]
allowed_origins = ["*"]

[storage]
backend     = "sqlite"
sqlite_path = "/data/registry-a.db"
max_connections = 10

[auth]
# Auth ON so S6 (restricted-visibility) can exercise the challenge/token
# flow. Other scenarios (S1–S5, S7, S8) keep working because
# anonymous_public_reads = true preserves anonymous access to
# public-visibility contexts.
enabled                = true
did_methods            = ["did:web"]
anonymous_public_reads = true
token_ttl_seconds      = 3600
challenge_ttl_seconds  = 300
token_leeway_seconds   = 30
# jwt_secret comes from ACDP_REGISTRY_AUTH__JWT_SECRET (compose env).

[webhook]
enabled        = true
url            = "http://playground:8000/webhooks/acdp"
timeout_seconds = 5
max_retries    = 3
queue_capacity = 1024
# secret comes from ACDP_REGISTRY_WEBHOOK__SECRET

[limits]
max_payload_bytes           = 1048576
max_embedded_bytes          = 65536
idempotency_key_ttl_seconds = 86400

[playground]
enabled = true
