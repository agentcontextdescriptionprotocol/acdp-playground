# Full-stack overlay: playground + two registries + the control plane.
#
#   docker compose -f docker-compose.yml -f docker-compose.full.yml up
#   (or `make up-full`)
#
# The base compose file runs standalone (playground + registries). This
# overlay adds the NestJS control plane as a first-class service and
# points the playground at it, so run-lifecycle notifications and
# forwarded webhooks land on `/ingest/acdp` and the auth/revocation
# scenarios have a real IdP to talk to.
#
# The control plane requires Postgres: ACDP 0.2 (RFC-ACDP-0010) persists the
# event store, run records, and receipt-audit verdicts there, and the CP runs
# its Drizzle migrations on boot (src/db/migrate.ts) before NestJS bootstraps.
# A throwaway `db` service backs the demo (tmpfs — state dies with the stack).
# Auth nonces/revocations still live in memory (AUTH_PERSISTENCE=memory), fine
# for this single-instance demo.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acdp_control_plane
    tmpfs:
      # Ephemeral demo storage — the audit/event tables are recreated by the
      # CP's boot migrations on every `up`.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acdp_control_plane"]
      interval: 5s
      timeout: 3s
      retries: 12

  control-plane:
    build:
      context: ../acdp-control-plane
      dockerfile: Dockerfile
    ports: ["3001:3001"]
    environment:
      PORT: "3001"
      HOST: 0.0.0.0
      NODE_ENV: production
      # The CP connects here at boot to run migrations and back the event /
      # run / receipt_audit stores. Matches the `db` service credentials.
      DATABASE_URL: ${CONTROL_PLANE_DATABASE_URL:-postgres://postgres:postgres@db:5432/acdp_control_plane}
      AUTH_PERSISTENCE: memory
      STREAM_HUB_STRATEGY: memory
      # IdP — issue/introspect/revoke tokens.
      TOKEN_ISSUANCE_ENABLED: "true"
      JWT_AUTHORITY: control-plane.playground.local
      JWT_SIGNING_ALG: ${CONTROL_PLANE_JWT_SIGNING_ALG:-HS256}
      # ≥32 bytes for HS256. Override in .env for anything real.
      JWT_SECRET: ${CONTROL_PLANE_JWT_SECRET:-cGxheWdyb3VuZC1jb250cm9sLXBsYW5lLWp3dC1zZWNyZXQtMzJi}
      JWT_TTL_SECONDS: "3600"
      CHALLENGE_TTL_SECONDS: "300"
      # Webhook ingest HMAC — MUST equal the playground's
      # CONTROL_PLANE_HMAC_SECRET (it signs forwarded webhooks with it).
      WEBHOOK_SECRET: ${CONTROL_PLANE_HMAC_SECRET:-playground-cp-secret}
      # Bearer API keys. AUTH_ADMIN_API_KEYS is a *subset* of AUTH_API_KEYS
      # (the auth guard rejects any bearer not in AUTH_API_KEYS before it ever
      # checks admin), so the admin token MUST also be listed in AUTH_API_KEYS
      # — otherwise admin endpoints 401 even with the admin bearer.
      AUTH_API_KEYS: ${CONTROL_PLANE_API_KEY:-playground-cp-api-key},${CONTROL_PLANE_ADMIN_TOKEN:-playground-cp-admin}
      AUTH_ADMIN_API_KEYS: ${CONTROL_PLANE_ADMIN_TOKEN:-playground-cp-admin}
      # Registry-receipt audit mode (RFC-ACDP-0010, ACDP 0.2). The CP
      # independently audits the receipt on every ingested context_published
      # event and surfaces discrepancy flags at GET /runs/:id `trust.flagged[]`
      # — the second-observer that catches a misbehaving registry (S23),
      # persisting verdicts to the `receipt_audits` table (now that the stack
      # has Postgres). The 0.2 trust *signals* (key_fingerprint /
      # registry_receipt) also forward via open-schema ingest regardless.
      RECEIPT_AUDIT_ENABLED: ${CONTROL_PLANE_RECEIPT_AUDIT_ENABLED:-true}
      RECEIPT_AUDIT_INTERVAL_SECONDS: ${CONTROL_PLANE_RECEIPT_AUDIT_INTERVAL_SECONDS:-15}
      RECEIPT_AUDIT_LOOKBACK_HOURS: ${CONTROL_PLANE_RECEIPT_AUDIT_LOOKBACK_HOURS:-24}
      # Policy + domain packs (P7). `static` needs no OPA sidecar.
      POLICY_BACKEND: ${POLICY_BACKEND:-static}
      DOMAIN_PACKS: ${DOMAIN_PACKS:-finance}
      # Optional: agent→tenant bindings and pinned keys (comma-separated).
      # MULTI-TENANT FAIL-FAST (CP #50): setting TENANT_AGENTS (or a
      # tenant-bound TENANT_API_KEYS entry) while AUTH_REQUIRE_TENANT is false
      # now refuses CP startup instead of failing open. If you populate
      # CONTROL_PLANE_TENANT_AGENTS, also set
      # CONTROL_PLANE_AUTH_REQUIRE_TENANT=true (see below).
      TENANT_AGENTS: ${CONTROL_PLANE_TENANT_AGENTS:-}
      CONTROL_PLANE_PINNED_KEYS: ${CONTROL_PLANE_PINNED_KEYS:-}
      # ── Round-3 sibling sync (CP #48/#49) ─────────────────────────────
      # Bind the issued JWT `aud` to this CP's authority and enforce it on
      # verification — a token minted here is rejected by a peer registry
      # bound to a different audience (and vice versa). Defaults to the
      # issuing authority; pinned explicitly for clarity.
      JWT_AUDIENCE: ${CONTROL_PLANE_JWT_AUDIENCE:-control-plane.playground.local}
      # Strict tenancy: default-deny any request that resolves only to the
      # silent `default` tenant. OFF here so the demo's untenanted scenarios
      # keep working (mirror of the registry's auth.require_tenant=false).
      AUTH_REQUIRE_TENANT: ${CONTROL_PLANE_AUTH_REQUIRE_TENANT:-false}
      # Ingest DoS guards on the @Public() /ingest/acdp route (pre-parse).
      # 1 MiB body / depth 32 matches the registry's [limits] defaults; the
      # playground's forwarded webhooks are far smaller.
      INGEST_MAX_BODY_BYTES: ${CONTROL_PLANE_INGEST_MAX_BODY_BYTES:-1048576}
      INGEST_MAX_JSON_DEPTH: ${CONTROL_PLANE_INGEST_MAX_JSON_DEPTH:-32}
      # OFF: the playground forwards events for the silent `default` tenant
      # (or stamps X-Tenant-Id from an enrolled agent). Flip on to require a
      # server-side enrollment before a non-default tenant is honoured.
      INGEST_STRICT_TENANT: ${CONTROL_PLANE_INGEST_STRICT_TENANT:-false}
      # Outbound-webhook SSRF policy (secure by default). The local stack
      # only delivers to in-cluster service names, so these stay off.
      WEBHOOK_SSRF_ALLOW_HTTP: ${CONTROL_PLANE_WEBHOOK_SSRF_ALLOW_HTTP:-false}
      WEBHOOK_SSRF_ALLOW_LOOPBACK: ${CONTROL_PLANE_WEBHOOK_SSRF_ALLOW_LOOPBACK:-false}
      # ── Round-4 sibling sync (CP #50) — federation ────────────────────
      # Peer issuers whose JWTs this CP accepts and peer /auth/revocations
      # feeds it polls (reciprocal of the feed it already serves). Empty in
      # the single-CP demo. TRUSTED_ISSUERS now REQUIRES an audience field
      # per entry (<iss>|<alg>|<secret-or-jwks>|<audience>[|scope]); a
      # REVOCATION_FEEDS entry's issuer must match a TRUSTED_ISSUERS iss and
      # only polls when token issuance is enabled. See the CP .env.example.
      TRUSTED_ISSUERS: ${CONTROL_PLANE_TRUSTED_ISSUERS:-}
      REVOCATION_FEEDS: ${CONTROL_PLANE_REVOCATION_FEEDS:-}
    healthcheck:
      # The CP runtime image ships neither curl nor wget; use the node binary
      # that runs the app to hit /healthz (exit 0 only on HTTP 200).
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
    depends_on:
      db:
        condition: service_healthy

  playground:
    environment:
      CONTROL_PLANE_URL: http://control-plane:3001
      CONTROL_PLANE_HMAC_SECRET: ${CONTROL_PLANE_HMAC_SECRET:-playground-cp-secret}
      CONTROL_PLANE_ADMIN_TOKEN: ${CONTROL_PLANE_ADMIN_TOKEN:-playground-cp-admin}
    depends_on:
      control-plane:
        condition: service_healthy

  # Next.js orchestration + observability console. Demo mode is baked OFF at
  # build time (NEXT_PUBLIC_* is inlined by Next) so the browser drives the
  # real stack; the Next server proxies to the services below by their compose
  # DNS names. Visit http://localhost:3000.
  ui-console:
    build:
      context: ../acdp-ui-console
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ACDP_UI_DEMO_MODE: "false"
    ports: ["3000:3000"]
    environment:
      PLAYGROUND_BASE_URL: http://playground:8000
      CONTROL_PLANE_BASE_URL: http://control-plane:3001
      REGISTRY_A_BASE_URL: http://registry-a:8100
      REGISTRY_B_BASE_URL: http://registry-b:8200
      CONTROL_PLANE_API_KEY: ${CONTROL_PLANE_ADMIN_TOKEN:-playground-cp-admin}
    depends_on:
      control-plane:
        condition: service_healthy
      playground:
        condition: service_started
