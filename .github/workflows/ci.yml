name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    # Steps execute from inside the playground checkout. The sibling
    # SDK is alongside at ../acdp-rs, matching the layout that uv's
    # editable source declaration in `pyproject.toml` expects.
    working-directory: acdp-playground

jobs:
  test:
    name: pytest + smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout playground
        uses: actions/checkout@v5
        with:
          path: acdp-playground

      - name: Checkout sibling SDK (acdp-rs)
        # `pyproject.toml` pins `acdp` to `../acdp-rs/bindings/acdp-py`
        # as an editable install (Rust → Python bindings). uv needs
        # this path resolvable at sync time.
        uses: actions/checkout@v5
        with:
          repository: agentcontextdescriptionprotocol/acdp-rs
          path: acdp-rs

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        # `--extra dev` pulls in pytest + pytest-asyncio + ruff, which
        # live under [project.optional-dependencies.dev] in
        # pyproject.toml. `--frozen` requires the committed uv.lock.
        run: uv sync --frozen --extra dev
        env:
          UV_LINK_MODE: copy

      - name: Lint (ruff)
        run: uv run ruff check acdp_client playground scripts tests

      - name: Run pytest
        run: uv run pytest --tb=short
        env:
          # Offline-safe defaults; no external services needed for
          # the unit suite (smoke check uses an in-process stub).
          LLM_PROVIDER: mock

      - name: Run smoke test (8/8 checks incl. P-256, JCS, in-process CP stub)
        run: uv run python scripts/smoke_test.py
        env:
          LLM_PROVIDER: mock
